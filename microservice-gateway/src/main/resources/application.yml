spring:
  application:
    name: microservice-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://microservice-auth
          predicates:
            - Path=/api/auth/**
        - id: course-service
          uri: lb://microservice-course
          predicates:
            - Path=/system/course/**
            - Path=/system/chapter/**
            - Path=/system/section/**
        - id: ai-service
          uri: lb://microservice-ai
          predicates:
            - Path=/api/ai/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true