# 定义工作流名称
name: Node.js Package CI/CD

# 触发条件：推送 v 开头的标签时执行
on:
  push:
    tags:
      - 'v*'

# 任务定义
jobs:
  build:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 第1步：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 第2步：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmmirror.com'

      # 第3步：安装依赖
      - name: Install dependencies
        run: npm install

      # 第4步：运行测试（如果不需要测试，可以删除这一步）
      - name: Run tests
        run: npm run test || echo "Tests skipped"

      # 第5步：正式发布到 NPM
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}